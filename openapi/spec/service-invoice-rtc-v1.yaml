        additionalInformation:
          type: string
          description: |
            **InformaĂ§Ă”es Adicionais: Simples vs. Estruturado (`additionalInformation` vs. `additionalInformationGroup`)**

            O layout oferece duas formas de enviar informaĂ§Ă”es complementares, visando flexibilidade e completude.

            *   **`additionalInformation` (Texto Simples):**
                Um campo de `string` para adicionar qualquer observaĂ§ĂŁo em formato de texto livre. Ă ideal para anotaĂ§Ă”es rĂĄpidas e genĂ©ricas.

            *   **`additionalInformationGroup` (Objeto Estruturado):**
                Um objeto que organiza dados complementares em campos especĂ­ficos, como `responsibilityDocumentIdentifier` (ART/RRT), `registrationWork` (MatrĂ­cula de Obra), `order` (Pedido), etc. Ă a forma mais completa e padronizada de enviar esses dados.

            **Comportamento e RelaĂ§ĂŁo:**
            Para facilitar a integraĂ§ĂŁo, o campo `additionalInformation` funciona como um atalho. Se vocĂȘ preencher apenas este campo, seu conteĂșdo serĂĄ automaticamente copiado para `additionalInformationGroup.otherInformation`. Isso garante que todas as informaĂ§Ă”es adicionais fiquem consolidadas na estrutura mais completa, mantendo a consistĂȘncia interna dos dados.

            **RecomendaĂ§ĂŁo:**
            *   Para observaĂ§Ă”es simples, use `additionalInformation`.
            *   Para dados especĂ­ficos como ART, MatrĂ­cula de Obra, etc., use os campos dedicados dentro de `additionalInformationGroup`.
        additionalInformationGroup:
          type: object
          description: |
            **InformaĂ§Ă”es Adicionais: Simples vs. Estruturado (`additionalInformation` vs. `additionalInformationGroup`)**

            O layout oferece duas formas de enviar informaĂ§Ă”es complementares, visando flexibilidade e completude.

            *   **`additionalInformation` (Texto Simples):**
                Um campo de `string` para adicionar qualquer observaĂ§ĂŁo em formato de texto livre. Ă ideal para anotaĂ§Ă”es rĂĄpidas e genĂ©ricas.

            *   **`additionalInformationGroup` (Objeto Estruturado):**
                Um objeto que organiza dados complementares em campos especĂ­ficos, como `responsibilityDocumentIdentifier` (ART/RRT), `registrationWork` (MatrĂ­cula de Obra), `order` (Pedido), etc. Ă a forma mais completa e padronizada de enviar esses dados.

            **Comportamento e RelaĂ§ĂŁo:**
            Para facilitar a integraĂ§ĂŁo, o campo `additionalInformation` funciona como um atalho. Se vocĂȘ preencher apenas este campo, seu conteĂșdo serĂĄ automaticamente copiado para `additionalInformationGroup.otherInformation`. Isso garante que todas as informaĂ§Ă”es adicionais fiquem consolidadas na estrutura mais completa, mantendo a consistĂȘncia interna dos dados.

            **RecomendaĂ§ĂŁo:**
            *   Para observaĂ§Ă”es simples, use `additionalInformation`.
            *   Para dados especĂ­ficos como ART, MatrĂ­cula de Obra, etc., use os campos dedicados dentro de `additionalInformationGroup`.
          properties:
            responsibilityDocumentIdentifier:
              type: string
              description: "Identificador do documento de responsabilidade tĂ©cnica (ART, RRT, etc.) (idDocTec)."
            referencedDocument:
              type: string
              description: "Documento de referĂȘncia relacionado ao serviĂ§o prestado (docRef)."
            order:
              type: string
              description: "NĂșmero do pedido/ordem de compra/ordem de serviĂ§o (xPed)."
            items:
              type: array
              description: "Grupo de itens do pedido/ordem de compra/ordem de serviĂ§o (gItemPed)."
              items:
                type: object
                properties:
                  item: {type: string, description: "Item do pedido/ordem de compra/ordem de serviĂ§o (xItemPed)."}
            otherInformation:
              type: string
              description: "Outras informaĂ§Ă”es complementares (xInfComp)."
        isEarlyInstallmentPayment:
          type: boolean
          description: "Indica se Ă© uma nota fiscal de pagamento parcelado antecipado, realizado antes do fornecimento do serviĂ§o. (PagamentoParceladoAntecipado, tpNaoSim)"
        immunityType:
          type: string
          description: |
            **Tipo de Imunidade (immunityType)**

            O campo `immunityType` Ă© condicional e deve ser utilizado **exclusivamente quando o campo `taxationType` for definido como `Immune`**.

            Sua finalidade Ă© especificar a base legal que fundamenta a imunidade tributĂĄria do **ISSQN (Imposto Sobre ServiĂ§os de Qualquer Natureza)** para a operaĂ§ĂŁo. Cada valor disponĂ­vel no campo corresponde a uma alĂ­nea especĂ­fica do Artigo 150, Inciso VI, da ConstituiĂ§ĂŁo Federal, que trata das limitaĂ§Ă”es ao poder de tributar.

            **RelaĂ§ĂŁo com a Reforma TributĂĄria (IBS/CBS):**

            Ă fundamental destacar que este campo se refere **apenas Ă  imunidade do ISSQN**. As regras de imunidade para os novos tributos (IBS e CBS) sĂŁo tratadas de forma separada, dentro do grupo `ibsCbs`, atravĂ©s de cĂłdigos especĂ­ficos no campo `classCode` (ex: cĂłdigos iniciados com `41xxxx`).

            **Em resumo:**
            A correta especificaĂ§ĂŁo do `immunityType` Ă© essencial para validar a justificativa legal da nĂŁo incidĂȘncia do ISSQN na nota fiscal, garantindo a conformidade perante as autoridades fiscais municipais durante o perĂ­odo de transiĂ§ĂŁo.

            ---

            Tipo de imunidade (tpImunidade) â usar apenas quando taxationMode = 'immunity'.
            Valores possĂ­veis:
            - `unspecified`: Imunidade (tipo nĂŁo informado na nota de origem)
            - `PublicEntitiesMutual`: PatrimĂŽnio, renda ou serviĂ§os, uns dos outros (CF88, Art 150, VI, a)
            - `Temples`: Templos de qualquer culto (CF88, Art 150, VI, b)
            - `PartiesUnionsEducationSocialNonprofit`: PatrimĂŽnio, renda ou serviĂ§os dos partidos polĂ­ticos, inclusive suas fundaĂ§Ă”es, das entidades sindicais dos trabalhadores, das instituiĂ§Ă”es de educaĂ§ĂŁo e de assistĂȘncia social, sem fins lucrativos (CF88, Art 150, VI, c)
            - `BooksPressPaper`: Livros, jornais, periĂłdicos e o papel destinado a sua impressĂŁo (CF88, Art 150, VI, d)
            - `BrazilianMusicPhonograms`: Fonogramas e videofonogramas musicais produzidos no Brasil (CF88, Art 150, VI, e)
          enum: [Unspecified, PublicEntitiesMutual, Temples, PartiesUnionsEducationSocialNonprofit, BooksPressPaper, BrazilianMusicPhonograms]
        retentionType:
          type: string
          description: |
            **Tipo de RetenĂ§ĂŁo do ISSQN (retentionType)**

            O campo `retentionType` determina quem Ă© o responsĂĄvel pelo recolhimento do **ISSQN (Imposto Sobre ServiĂ§os de Qualquer Natureza)**. Ele Ă© um dos campos mais importantes para a correta apuraĂ§ĂŁo do ISSQN, pois define a transferĂȘncia da responsabilidade de pagamento do imposto do prestador para outra parte na operaĂ§ĂŁo.

            **Finalidade e OpĂ§Ă”es:**

            *   **`notWithheld` (NĂŁo Retido):** Esta Ă© a situaĂ§ĂŁo padrĂŁo. O **prestador** do serviĂ§o Ă© o responsĂĄvel por calcular e recolher o ISSQN devido.
            *   **`withheldByBuyer` (Retido pelo Tomador):** A responsabilidade pelo recolhimento do ISSQN Ă© transferida para o **tomador** (cliente/comprador) do serviĂ§o. O valor do ISSQN Ă© descontado do total a ser pago ao prestador, e o tomador fica encarregado de repassĂĄ-lo ao municĂ­pio.
            *   **`withheldByIntermediary` (Retido pelo IntermediĂĄrio):** Em operaĂ§Ă”es que contam com um intermediĂĄrio (como marketplaces ou agĂȘncias), a responsabilidade pelo recolhimento do ISSQN Ă© transferida para este **intermediĂĄrio**.

            **Comportamento AutomĂĄtico vs. Manual:**

            Conforme a descriĂ§ĂŁo do campo, ele possui uma lĂłgica de prioridade:
            1.  **Manual:** Se um valor for explicitamente enviado na requisiĂ§ĂŁo, ele serĂĄ utilizado.
            2.  **AutomĂĄtico:** Se o campo nĂŁo for enviado (nulo), o sistema aplicarĂĄ as regras de cĂĄlculo automĂĄticas (baseadas na legislaĂ§ĂŁo, local da prestaĂ§ĂŁo e cadastro dos envolvidos) para definir se a retenĂ§ĂŁo Ă© aplicĂĄvel e quem Ă© o responsĂĄvel.

            **RelaĂ§ĂŁo com a Reforma TributĂĄria (IBS/CBS):**

            Assim como outros campos legados, o `retentionType` aplica-se **exclusivamente ao ISSQN**. As regras de retenĂ§ĂŁo e recolhimento para os novos tributos (IBS e CBS) serĂŁo definidas por legislaĂ§ĂŁo complementar especĂ­fica e tratadas em outros campos do layout.

            ---

            Tipo de retenĂ§ĂŁo do ISSQN (tpRetISSQN).
            Valores possĂ­veis:
            - `NotWithheld`: NĂŁo Retido
            - `WithheldByBuyer`: Retido pelo Tomador
            - `WithheldByIntermediary`: Retido pelo IntermediĂĄrio

            Define o tipo de retenĂ§ĂŁo. Prioridade: Se um valor for enviado na integraĂ§ĂŁo, ele serĂĄ utilizado. AutomĂĄtico: Se o campo nĂŁo for enviado (nulo), o sistema aplicarĂĄ a regra de cĂĄlculo automĂĄtica para definir a retenĂ§ĂŁo.
          enum: [NotWithheld, WithheldByBuyer, WithheldByIntermediary]
          default: NotWithheld
