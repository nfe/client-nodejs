    deduction:
      type: object
      description: |
        Grupo de informaĂ§Ă”es relativas ao valores para deduĂ§ĂŁo/reduĂ§ĂŁo do valor da base de cĂĄlculo (vDedRed). DeduĂ§ĂŁo/ReduĂ§ĂŁo aplicada SOMENTE Ă  base de cĂĄlculo do ISSQN.

        **DeduĂ§Ă”es: Simples vs. Estruturado (`deductionsAmount` vs. `deduction`)**

        O layout oferece duas formas de registrar deduĂ§Ă”es da base de cĂĄlculo do ISSQN, visando flexibilidade e conformidade com os diferentes padrĂ”es (municipal legado vs. nacional).

        *   **`deductionsAmount` (Valor Simples):**
            Um campo numĂ©rico para informar o **valor total consolidado** das deduĂ§Ă”es. Ă uma abordagem direta, compatĂ­vel com layouts mais antigos que nĂŁo exigem o detalhamento dos documentos que comprovam a deduĂ§ĂŁo.

        *   **`deduction` (Grupo Estruturado):**
            Um objeto complexo que permite justificar cada deduĂ§ĂŁo com base em documentos fiscais, alinhando-se ao **padrĂŁo da NFS-e Nacional**. Ele detalha a origem de cada valor (chave do documento, tipo, valor, fornecedor).

        **RelaĂ§ĂŁo e RecomendaĂ§ĂŁo:**
        A coexistĂȘncia dos campos oferece compatibilidade. `deductionsAmount` Ă© uma opĂ§ĂŁo simplificada, enquanto o grupo `deduction` Ă© a forma mais completa e recomendada para garantir rastreabilidade e conformidade fiscal com o padrĂŁo nacional. O sistema de emissĂŁo priorizarĂĄ os dados detalhados do grupo `deduction`, se fornecidos.

        **RecomendaĂ§ĂŁo de Uso:**
        *   Use `deductionsAmount` para integraĂ§Ă”es simples ou quando nĂŁo hĂĄ detalhamento dos documentos.
        *   Use o grupo `deduction` sempre que a informaĂ§ĂŁo detalhada dos documentos estiver disponĂ­vel para garantir a mĂĄxima conformidade.
      oneOf:
        - required: [rate]
        - required: [amount]
        - required: [documents]
      properties:
        rate: {type: number, description: "Percentual padrĂŁo de deduĂ§ĂŁo/reduĂ§ĂŁo (pDR, %)."}
        amount: {type: number, description: "Valor monetĂĄrio padrĂŁo de deduĂ§ĂŁo/reduĂ§ĂŁo (vDR, R$)."}
        documents:
          type: array
