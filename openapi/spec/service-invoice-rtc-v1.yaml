  /v1/companies/:company_id/serviceinvoices/:id/cancellation-xml:
    get:
      tags:
        - Nota Fiscal de ServiĂ§o (RTC)
      summary: Download do XML do evento de cancelamento da NFS-e (Ambiente Nacional)
      description: |
        Retorna o XML do **evento de cancelamento** (`e110001`) de uma NFS-e emitida no **Ambiente Nacional (ADN)**.

        > **AtenĂ§ĂŁo**
        > DisponĂ­vel **apenas** para notas do Ambiente Nacional. Provedores de layout municipal/ABRASF nĂŁo possuem evento de cancelamento prĂłprio e retornam `404`.

        Quando existem o XML enviado (request do `e110001`) e o XML do evento autorizado (retorno do ADN â `procEventoNFSe`), o **retorno autorizado Ă© priorizado**. O XML sĂł estĂĄ disponĂ­vel para notas com status `Cancelled`.
      parameters:
        - name: company_id
          in: path
          description: ID da empresa
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: ID da Nota Fiscal de ServiĂ§o (NFS-e)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: XML do evento de cancelamento retornado com sucesso
          content:
            application/xml:
              schema:
                type: string
        '404':
          description: NĂŁo hĂĄ XML de evento de cancelamento para esta nota (provedor legado, ambiente nĂŁo Nacional ou nota ainda nĂŁo cancelada)

components:
  schemas:
    NFSeRequest:
      type: object
      title: Nota Fiscal de ServiĂ§o (NFSe) Schema
      required:
        - cityServiceCode
        - description
        - servicesAmount
        - nbsCode
      properties:
        externalId:
          type: string
          description: IdentificaĂ§ĂŁo Ășnica do cliente
        cityServiceCode:
          type: string
          description: CĂłdigo do serviĂ§o no municipio
        federalServiceCode:
          type: string
          description: CĂłdigo federal do servico (Item da lista de serviĂ§o LC 116) (CodigoServico, tpCodigoServico)
          maxLength: 5
        description:
          type: string
          description: DescriĂ§ĂŁo dos serviĂ§os (Discriminacao, tpDiscriminacao)
          maxLength: 2000
        servicesAmount:
          type: number
          description: Valor do serviĂ§os (ValorServicos - V1.0 SP) - Valor total dos serviĂ§os (tpValor)
        nbsCode:
          type: string
          description: CĂłdigo do NBS no municipio (somente quando necessario na cidade) (NBS, tpCodigoNBS)
          maxLength: 9
        cnaeCode:
          type: string
          description: CĂłdigo CNAE (somente quando necessario na cidade)
        ncmCode:
          type: string
          description: CĂłdigo NCM (Nomenclatura Comum do Mercosul) (NCM, tpCodigoNCM)
          maxLength: 8
        paidAmount:
          type: number
          description: Valor dos ServiĂ§os pago (Valor Total Recebido, tpValor)
        issuedOn:
          type: string
          format: date-time
          description: |
            Data da emissĂŁo no formato YYYY-MM-DDTHH:MM:SS.SSSSSS-03:00 (dhEmi, DataEmissaoNFe).
            **AutomĂĄtico**: Se nĂŁo for informado, o sistema utilizarĂĄ a data e hora atuais no momento do processamento.
        accrualOn:
          type: string
          format: date
          description: |
            Data da competĂȘncia da prestaĂ§ĂŁo do serviĂ§o no formato AAAA-MM-DD (Competencia).
            **AutomĂĄtico**: Se nĂŁo for informado, o sistema utilizarĂĄ a data do campo `issuedOn`.
        rpsSerialNumber:
          type: string
          description: |
            NĂșmero de SĂ©rie da RPS (SerieRPS, serie, tpSerieRPS).
            **Prioridade**: Se informado, o valor enviado serĂĄ utilizado.
            **AutomĂĄtico**: Se nĂŁo for informado, o sistema utilizarĂĄ o valor definido no cadastro da empresa.
          maxLength: 5
        rpsNumber:
          type: number
          description: |
            NĂșmero da RPS (NumeroRPS, nDPS, tpNumero).
            **Prioridade**: Se informado, o valor enviado serĂĄ utilizado.
            **AutomĂĄtico**: Se nĂŁo for informado, o sistema utilizarĂĄ o prĂłximo nĂșmero da sequĂȘncia automĂĄtica.
        taxationType:
          type: string
          description: |
            **Tipo de TributaĂ§ĂŁo (taxationType)**

            O campo `taxationType` define o regime de tributaĂ§ĂŁo do **ISSQN (Imposto Sobre ServiĂ§os de Qualquer Natureza)**. Ele Ă© um campo legado, mantido para compatibilidade com os layouts municipais existentes, como o da Prefeitura de SĂŁo Paulo, e continua sendo fundamental para o cĂĄlculo do ISS durante o perĂ­odo de transiĂ§ĂŁo da Reforma TributĂĄria.

            **Finalidade Principal (Contexto do ISSQN):**

            Este campo indica ao sistema como o ISSQN deve ser tratado na operaĂ§ĂŁo. Com base no valor selecionado (ex: `WithinCity`, `OutsideCity`, `Immune`), o sistema determina se o ISSQN Ă© devido, se a tributaĂ§ĂŁo ocorrerĂĄ dentro ou fora do municĂ­pio, ou se a operaĂ§ĂŁo Ă© isenta ou imune a este imposto especĂ­fico.

            **RelaĂ§ĂŁo com a Reforma TributĂĄria (IBS/CBS):**

            Ă crucial entender que o `taxationType` **nĂŁo se aplica aos novos tributos (IBS e CBS)**. Para a apuraĂ§ĂŁo do IBS e da CBS, as regras de tributaĂ§ĂŁo e o local de incidĂȘncia sĂŁo definidos exclusivamente pelos campos dentro do grupo `IbsCbs`, como o `operationIndicator` e o `classCode`.

            **Em resumo:**
            *   **`taxationType`**: Governa o comportamento do **ISSQN**.
            *   **`ibsCbs`**: Governa o comportamento do **IBS e da CBS**.

            Durante o perĂ­odo de transiĂ§ĂŁo, ambos os sistemas de tributaĂ§ĂŁo coexistirĂŁo, tornando o preenchimento correto de todos esses campos essencial para a conformidade fiscal da nota.

            ---

            Tipo da tributaĂ§ĂŁo (TributacaoRPS, tpTributacaoNFe).
            Valores possĂ­veis:
            - `None`: Nenhuma
            - `WithinCity`: TributaĂ§ĂŁo no municĂ­pio
            - `OutsideCity`: TributaĂ§ĂŁo fora do municĂ­pio
            - `Export`: ExportaĂ§ĂŁo
            - `Free`: Isenta
            - `Immune`: Imune
            - `SuspendedCourtDecision`: Exigibilidade suspensa por decisĂŁo judicial
            - `SuspendedAdministrativeProcedure`: Exigibilidade suspensa por procedimento administrativo
            - `OutsideCityFree`: Isenta e fora do municĂ­pio
            - `OutsideCityImmune`: Imune e fora do municĂ­pio
            - `OutsideCitySuspended`: Suspensa e fora do municĂ­pio
            - `OutsideCitySuspendedAdministrativeProcedure`: Suspensa por processo administrativo e fora do municĂ­pio
            - `ObjectiveImune`: Imunidade Objetiva
          enum: [None, WithinCity, OutsideCity, Export, Free, Immune, SuspendedCourtDecision, SuspendedAdministrativeProcedure, OutsideCityFree, OutsideCityImmune, OutsideCitySuspended, OutsideCitySuspendedAdministrativeProcedure, ObjectiveImune]
          default: WithinCity
        issRate:
          type: number
          description: |
            AlĂ­quota do ISS (pAliq, tpAliquota).
            **AutomĂĄtico**: Se nĂŁo for informado, o sistema utilizarĂĄ o valor definido no cadastro do cĂłdigo de serviĂ§o.
        issTaxAmount:
          type: number
          description: |
            Valor do ISS (ValorISS, tpValor).
            **AutomĂĄtico**: Se nĂŁo for informado, o sistema realizarĂĄ o cĂĄlculo automĂĄtico.
        deductionsAmount:
          type: number
          description: |
            **DeduĂ§Ă”es: Simples vs. Estruturado (`deductionsAmount` vs. `deduction`)**

            O layout oferece duas formas de registrar deduĂ§Ă”es da base de cĂĄlculo do ISSQN, visando flexibilidade e conformidade com os diferentes padrĂ”es (municipal legado vs. nacional).

            *   **`deductionsAmount` (Valor Simples):**
                Um campo numĂ©rico para informar o **valor total consolidado** das deduĂ§Ă”es. Ă uma abordagem direta, compatĂ­vel com layouts mais antigos que nĂŁo exigem o detalhamento dos documentos que comprovam a deduĂ§ĂŁo.

            *   **`deduction` (Grupo Estruturado):**
                Um objeto complexo que permite justificar cada deduĂ§ĂŁo com base em documentos fiscais, alinhando-se ao **padrĂŁo da NFS-e Nacional**. Ele detalha a origem de cada valor (chave do documento, tipo, valor, fornecedor).

            **RelaĂ§ĂŁo e RecomendaĂ§ĂŁo:**
            A coexistĂȘncia dos campos oferece compatibilidade. `deductionsAmount` Ă© uma opĂ§ĂŁo simplificada, enquanto o grupo `deduction` Ă© a forma mais completa e recomendada para garantir rastreabilidade e conformidade fiscal com o padrĂŁo nacional. O sistema de emissĂŁo priorizarĂĄ os dados detalhados do grupo `deduction`, se fornecidos.

