        operationIndicator:
          type: string
          description: |
            **Indicador da OperaĂ§ĂŁo (operationIndicator / cIndOp)**

            O campo `operationIndicator` (ou `cIndOp` nos schemas XSD) Ă© um cĂłdigo obrigatĂłrio que define a natureza e a caracterĂ­stica da operaĂ§ĂŁo de fornecimento do serviĂ§o ou bem, sendo um dos campos mais importantes introduzidos pela Reforma TributĂĄria.

            Sua principal finalidade Ă© determinar o **local de incidĂȘncia** (onde o imposto Ă© devido) para os novos tributos, o IBS (Imposto sobre Bens e ServiĂ§os) e a CBS (ContribuiĂ§ĂŁo sobre Bens e ServiĂ§os). Diferente do modelo anterior, onde o local da prestaĂ§ĂŁo era muitas vezes suficiente, este cĂłdigo traz uma regra especĂ­fica para cada tipo de operaĂ§ĂŁo.

            **Como funciona?**

            Com base no cĂłdigo informado, o sistema tributĂĄrio nacional identifica se o imposto deve ser recolhido:
            *   No municĂ­pio onde um imĂłvel estĂĄ localizado (para serviĂ§os de construĂ§ĂŁo ou sobre imĂłveis).
            *   No endereĂ§o do estabelecimento do fornecedor.
            *   No endereĂ§o do adquirente (comprador/tomador) do serviĂ§o.
            *   No local onde um evento ocorre.
            *   Entre outras regras especĂ­ficas.

            A escolha do cĂłdigo correto Ă©, portanto, fundamental para garantir a conformidade fiscal e o recolhimento do IBS para o estado e municĂ­pio corretos. A seleĂ§ĂŁo de um cĂłdigo inadequado pode levar a apuraĂ§Ă”es de impostos incorretas.

            **Exemplo prĂĄtico:**
            Para um serviĂ§o de reforma de um imĂłvel (`cĂłdigo 020201`), o imposto serĂĄ devido no municĂ­pio onde o imĂłvel estĂĄ localizado, independentemente de onde o prestador ou o tomador do serviĂ§o estejam estabelecidos. JĂĄ para um serviĂ§o de consultoria prestado Ă  distĂąncia (`cĂłdigo 100301`), a regra geral aponta para o domicĂ­lio do adquirente.

            A lista completa de valores pode ser consultada na Tabela de [operationIndicator](https://nfe.io/docs/documentacao/reforma-tributaria/conceitos-funcionais/documentacao-layout-nfse-rtc/#tabela-de-operationindicator) da documentaĂ§ĂŁo funcional.
