          properties:
            cityCode: {type: string, description: "CĂłdigo IBGE do municĂ­pio emissor (cMunNFSeMun)."}
            number: {type: string, maxLength: 15, description: "NĂșmero da NFS-e municipal (nNFSeMun)."}
            verificationCode: {type: string, maxLength: 9, description: "CĂłdigo de verificaĂ§ĂŁo (cVerifNFSeMun)."}
        fiscalDocumentNumber: {type: string, maxLength: 255, description: "Identificador de outro documento fiscal nĂŁo eletrĂŽnico (nDocFisc)."}
        nonFiscalDocumentNumber: {type: string, maxLength: 255, description: "Identificador de documento nĂŁo fiscal, ex: nota de dĂ©bito interna (nDoc)."}
        deductionType:
          type: string
          description: |
            Tipo da deduĂ§ĂŁo/reduĂ§ĂŁo (tpDedRed).
            Valores aceitos (nome do enum â cĂłdigo numĂ©rico â descriĂ§ĂŁo):
