        Totais aproximados dos tributos (Lei 12.741/2012). (totTrib)  -  Define os totais aproximados de tributos. **Prioridade**: Se informado, o valor enviado serĂĄ utilizado, ignorando o cĂĄlculo automĂĄtico. **AutomĂĄtico**: Caso o campo nĂŁo seja enviado (nulo), os valores serĂŁo calculados automaticamente pelo sistema.

        **Estrutura Simplificada vs. Detalhada (`approximateTax` vs. `approximateTotals`)**

        Ambos os campos, `approximateTax` e `approximateTotals`, servem para atender Ă  Lei 12.741/2012 ("Lei De Olho no Imposto"), que exige a informaĂ§ĂŁo da carga tributĂĄria aproximada na nota fiscal. A principal diferenĂ§a entre eles estĂĄ na **granularidade** da informaĂ§ĂŁo.

        *   **`approximateTax` (Estrutura Simplificada):**
            Permite informar a carga tributĂĄria de forma consolidada, atravĂ©s de um percentual (`totalRate`) ou valor monetĂĄrio (`totalAmount`) totais. Ă ideal para sistemas que nĂŁo possuem a decomposiĂ§ĂŁo dos tributos por esfera governamental.

        *   **`approximateTotals` (Estrutura Detalhada):**
            Permite um detalhamento completo, separando os valores por esfera: `federal`, `state` e `municipal`. Ă a escolha ideal quando o sistema possui essa informaĂ§ĂŁo decomposta, oferecendo maior transparĂȘncia.

        **Flexibilidade e Comportamento AutomĂĄtico:**
        A coexistĂȘncia dos dois campos oferece **flexibilidade**. O `approximateTax` simplifica a integraĂ§ĂŁo para sistemas com dados consolidados, enquanto o `approximateTotals` atende a sistemas mais robustos que desejam fornecer o detalhamento completo. O sistema de emissĂŁo priorizarĂĄ a informaĂ§ĂŁo mais detalhada, se disponĂ­vel.

        **Importante:** Se nenhum dos grupos (`approximateTax` ou `approximateTotals`) for preenchido, o sistema realizarĂĄ o cĂĄlculo automĂĄtico e preencherĂĄ o grupo `approximateTax`.
