            **Opcional**: pode ser omitido; envie apenas quando houver intermediĂĄrio na operaĂ§ĂŁo (por exemplo, quando a retenĂ§ĂŁo dos tributos Ă© feita pelo intermediĂĄrio, `issWithheldIndicator = WithheldByIntermediary`). Quando informado, segue a mesma estrutura do `borrower` (ex.: `type`, `federalTaxNumber`, `name`).
