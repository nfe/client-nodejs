openapi: 3.0.1
info:
  title: API de EmissĂŁo de Nota Fiscal de ServiĂ§os EletrĂŽnica (NFS-e) - RTC
  version: v3
  description: |
    ### IntroduĂ§ĂŁo
    API para envio de dados de RPS/DPS para emissĂŁo de NFS-e, alinhada com o padrĂŁo nacional e complementada com campos especĂ­ficos do Web Service da Prefeitura de SĂŁo Paulo (NF-e/NFS-e).

    ### AdequaĂ§ĂŁo de Leiaute

    Nesta adequaĂ§ĂŁo de leiaute, foram considerados os leiautes do **Ambiente Nacional**, **SĂŁo Paulo e ABRASF**.

    > **AtenĂ§ĂŁo**
    > _Sujeito a alteraĂ§Ă”es mediante notas tĂ©cnicas e processos de homologaĂ§ĂŁo._
servers:
  - url: https://api.nfe.io
    description: Para realizar testes no ambiente de homologaĂ§ĂŁo da prefeitura, Ă© necessĂĄrio entrar em contato com o suporte para que a empresa seja parametrizada com os dados necessĂĄrios.
tags:
  - name: Nota Fiscal de ServiĂ§o (RTC)
    description: OperaĂ§Ă”es relacionadas Ă  Nota Fiscal EletrĂŽnica de ServiĂ§o

